<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goal Tracker — Burlebo Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0f12; --panel: #14171c; --panel-2: #1a1e25;
    --border: #252a33; --text: #e8eaed; --text-dim: #8a92a0;
    --accent: #ff6b35; --green: #4ade80; --red: #f87171; --yellow: #fbbf24; --blue: #38bdf8;
    --radius: 10px; --radius-sm: 6px;
    --coy: #ff6b35;      --coy-bg: rgba(255, 107, 53, 0.15);
    --designer: #a78bfa; --designer-bg: rgba(167, 139, 250, 0.15);
    --admin: #4ade80;    --admin-bg: rgba(74, 222, 128, 0.15);
    --employee: #38bdf8; --employee-bg: rgba(56, 189, 248, 0.15);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; }

  header {
    border-bottom: 1px solid var(--border); padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between; background: var(--panel);
  }
  header h1 { font-size: 18px; font-weight: 700; margin: 0; }
  header nav { display: flex; gap: 18px; align-items: center; }
  header nav a { color: var(--text-dim); text-decoration: none; font-size: 14px; font-weight: 500; }
  header nav a:hover { color: var(--text); }
  header nav a.active { color: var(--accent); }
  .role-pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .role-pill:hover { opacity: 0.85; }
  .role-pill.coy { background: var(--coy-bg); color: var(--coy); }
  .role-pill.designer { background: var(--designer-bg); color: var(--designer); }
  .role-pill.admin { background: var(--admin-bg); color: var(--admin); }
  .role-pill.employee { background: var(--employee-bg); color: var(--employee); }

  main { max-width: 1200px; margin: 0 auto; padding: 32px; }
  main.hidden { display: none; }
  h2 { font-size: 14px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 16px 0; }
  .page-title { font-size: 28px; font-weight: 700; margin: 0 0 4px 0; }
  .page-sub { font-size: 14px; color: var(--text-dim); margin: 0 0 28px 0; }

  /* Hero progress card */
  .hero {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: center;
  }
  @media (max-width: 760px) { .hero-grid { grid-template-columns: 1fr; } }
  .hero-num { font-size: 44px; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; }
  .hero-num.ahead { color: var(--green); }
  .hero-num.behind { color: var(--red); }
  .hero-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .hero-sub { font-size: 14px; color: var(--text-dim); margin-top: 4px; }

  .progress-bar {
    height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; margin: 16px 0 8px;
    border: 1px solid var(--border);
  }
  .progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff9758); transition: width 0.4s; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); }

  /* Stat grid */
  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 600; line-height: 1.1; }
  .stat-foot { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }

  /* Chart */
  .chart-wrap {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  svg.chart { display: block; width: 100%; height: 380px; }
  .chart-legend { display: flex; gap: 18px; margin-bottom: 8px; font-size: 12px; color: var(--text-dim); flex-wrap: wrap; }
  .chart-legend .item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 14px; height: 3px; border-radius: 1px; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  }

  /* Loading */
  .loading { color: var(--text-dim); font-size: 14px; padding: 40px 0; text-align: center; }

  /* Role modal (same as other pages) */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 380px; max-width: calc(100vw - 32px); }
  .modal-title { font-size: 18px; font-weight: 700; margin: 0 0 6px 0; }
  .modal-sub { font-size: 13px; color: var(--text-dim); margin: 0 0 20px 0; }
  .modal-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .modal-option {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 13px 14px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
    font-weight: 500; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px;
  }
  .modal-option:hover { background: #1f242c; border-color: #2f3540; }
  .modal-option .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .modal-option .dot.coy { background: var(--coy); }
  .modal-option .dot.designer { background: var(--designer); }
  .modal-option .dot.admin { background: var(--admin); }
  .modal-option .dot.employee { background: var(--employee); }
  .pw-field { display: none; margin-top: 8px; }
  .pw-field input {
    width: 100%; padding: 11px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--radius-sm); outline: none; margin-bottom: 8px;
  }
  .pw-field input:focus { border-color: var(--accent); }
  .pw-error { display: none; font-size: 12px; color: var(--red); margin-bottom: 8px; }
  .pw-row { display: flex; gap: 8px; }
  .btn { padding: 10px 16px; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); }
  .btn:hover { background: #1f242c; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { opacity: 0.92; }
  .btn.ghost { background: transparent; color: var(--text-dim); }
  .btn.ghost:hover { color: var(--text); }
</style>
</head>
<body>

<!-- Role modal -->
<div class="modal-overlay" id="role-modal">
  <div class="modal-card">
    <div class="modal-title">Burlebo Analytics</div>
    <div class="modal-sub" id="modal-sub">Choose your role to get started.</div>
    <div class="modal-options" id="role-options">
      <button class="modal-option" onclick="pickRole('coy')"><span class="dot coy"></span> Coy Needham (Owner)</button>
      <button class="modal-option" onclick="pickRole('designer')"><span class="dot designer"></span> Graphic Designer</button>
      <button class="modal-option" onclick="pickRole('admin')"><span class="dot admin"></span> Executive Admin</button>
      <button class="modal-option" onclick="pickRole('employee')"><span class="dot employee"></span> Employee</button>
    </div>
    <div class="pw-field" id="pw-field">

             onkeydown="if(event.key==='Enter')checkPw();if(event.key==='Escape')cancelPw()">

        <button class="btn ghost" style="flex:1" onclick="cancelPw()">Back</button>
        <button class="btn primary" style="flex:1" onclick="checkPw()">Continue</button>
      </div>
    </div>
  </div>
</div>

<header id="app-header" style="display:none;">
  <h1>Burlebo Analytics</h1>

</header>

<main id="app-main" class="hidden">
  <div class="page-title">Goal Tracker</div>
  <div class="page-sub" id="page-sub">—</div>

  <div id="content"><div class="loading">Loading data…</div></div>
</main>

<script>
  // ============================================================================
  // Supabase + auth
  // ============================================================================
  // ============================================================================
  // Shared nav loader — pulls /nav.html and injects + highlights active link
  // ============================================================================

      tmp.innerHTML = html;

        nav.insertBefore(a, pill);
      }
    } catch (err) {
      console.error('Nav load failed:', err);
    }
  }

  const SUPABASE_URL = 'https://uoetojuyzyngfopsmmxk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvZXRvanV5enluZ2ZvcHNtbXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODY3ODIsImV4cCI6MjA5NDk2Mjc4Mn0.FVhs_0waTWIYkTVY2j4HERhlovggIFau07RuBu69M8E';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const ROLES = {
    coy:      { name: 'Coy Needham (Owner)', password: 'coyneedham', cls: 'coy' },
    designer: { name: 'Graphic Designer',    password: 'Graphic',    cls: 'designer' },
    admin:    { name: 'Executive Admin',     password: 'Admin',      cls: 'admin' },
    employee: { name: 'Employee',            password: 'Burlebo',    cls: 'employee' },
  };
  let role = null;
  let pendingRole = null;

  function pickRole(r) {
    pendingRole = r;
    document.getElementById('modal-sub').textContent = `Enter password for ${ROLES[r].name}.`;
    document.getElementById('role-options').style.display = 'none';

  // ============================================================================
  // Date helpers (UTC-safe, no timezone shifts)
  // ============================================================================
  function toISO(date) {
    return date.getUTCFullYear() + '-' +
      String(date.getUTCMonth() + 1).padStart(2, '0') + '-' +
      String(date.getUTCDate()).padStart(2, '0');
  }
  function parseISO(s) {
    if (!s) return null;
    const parts = String(s).slice(0, 10).split('-').map(n => parseInt(n, 10));
    if (parts.length !== 3 || parts.some(isNaN)) return null;
    return new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
  }
  function daysBetween(a, b) {
    return Math.round((b.getTime() - a.getTime()) / 86400000);
  }
  function addDays(d, n) {
    const x = new Date(d.getTime());
    x.setUTCDate(x.getUTCDate() + n);
    return x;
  }
  function formatDateLong(iso) {
    const d = parseISO(iso);
    if (!d) return iso;
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
  }
  function formatMoney(n, decimals = 0) {
    if (n == null) return '—';
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }
  function formatPct(n, decimals = 1) {
    if (n == null) return '—';
    return (n * 100).toFixed(decimals) + '%';
  }
  function todayISO() {
    return toISO(new Date());
  }

  // ============================================================================
  // Goal Tracker calculator — JS port of goal_tracker.py
  // ============================================================================
  function buildGoalTracker(dailySales, config) {
    const goal = config.goal || {};
    const target = parseFloat(goal.target || 7000000);
    const startStr = goal.start_date || '2026-01-01';
    const endStr = goal.end_date || '2026-12-31';

    const start = parseISO(startStr);
    const end = parseISO(endStr);
    if (!start || !end) return { error: 'Invalid goal dates' };

    const totalDays = daysBetween(start, end) + 1;
    const dailyRequired = totalDays > 0 ? target / totalDays : 0;

    const today = parseISO(todayISO()); // strip time to a UTC date

    // Build timeline
    const timeline = [];
    let cumulativeRequired = 0;
    let cumulativeActual = 0;

    let current = new Date(start.getTime());
    while (current <= end) {
      const dateStr = toISO(current);
      cumulativeRequired += dailyRequired;
      const actual = dailySales[dateStr]; // undefined if no data
      const hasActual = actual !== undefined && actual !== null;
      if (hasActual) cumulativeActual += actual;
      const isPast = current <= today;

      timeline.push({
        date: dateStr,
        required: dailyRequired,
        cumulative_required: cumulativeRequired,
        actual: hasActual ? actual : null,
        cumulative_actual: isPast ? cumulativeActual : null,
        pct_diff: hasActual && dailyRequired > 0 ? (actual - dailyRequired) / dailyRequired : null,
      });
      current = addDays(current, 1);
    }

    // Summary stats
    const daysElapsed = timeline.filter(r => r.actual !== null).length;
    const totalActual = timeline.reduce((s, r) => s + (r.actual || 0), 0);
    const totalRequiredToDate = daysElapsed > 0 ? dailyRequired * daysElapsed : 0;
    const pctOfGoal = target > 0 ? totalActual / target : 0;
    const paceDiff = totalRequiredToDate > 0 ? (totalActual - totalRequiredToDate) / totalRequiredToDate : 0;

    const daysRemaining = today <= end ? daysBetween(today, end) : 0;
    const neededPerDayRemaining = daysRemaining > 0 ? (target - totalActual) / daysRemaining : 0;

    return {
      goal: target,
      start_date: startStr,
      end_date: endStr,
      daily_required: dailyRequired,
      total_actual: totalActual,
      total_required_to_date: totalRequiredToDate,
      pct_of_goal: pctOfGoal,
      pace_diff: paceDiff,
      days_elapsed: daysElapsed,
      days_remaining: daysRemaining,
      needed_per_day_remaining: neededPerDayRemaining,
      timeline,
    };
  }

  // ============================================================================
  // Data load
  // ============================================================================
  async function loadGoal() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Loading data…</div>';

    // 1. Get config
    const { data: configRow, error: configErr } = await sb
      .from('dashboard_config').select('*').eq('id', 1).single();
    if (configErr) {
      content.innerHTML = `<div class="empty-state">Couldn't load goal config: ${configErr.message}</div>`;
      return;
    }

    const goalConfig = configRow.goal || {};
    const startStr = goalConfig.start_date || '2026-01-01';
    const endStr = goalConfig.end_date || '2026-12-31';

    // 2. Get sales totals per day within the goal window
    // Aggregate in SQL via select? Postgres doesn't expose group-by directly via PostgREST,
    // so we pull rows + sum in JS. We only need date + revenue.
    const { data: salesRows, error: salesErr } = await sb
      .from('sales_daily')
      .select('date, revenue')
      .gte('date', startStr)
      .lte('date', endStr);

    if (salesErr) {
      content.innerHTML = `<div class="empty-state">Couldn't load sales: ${salesErr.message}</div>`;
      return;
    }

    const dailySales = {};
    for (const r of salesRows || []) {
      // r.date may come back as a Date object or string; normalize
      const key = (r.date instanceof Date) ? toISO(r.date) : String(r.date).slice(0, 10);
      dailySales[key] = (dailySales[key] || 0) + parseFloat(r.revenue || 0);
    }

    const result = buildGoalTracker(dailySales, configRow);
    render(result);
  }

  // ============================================================================
  // Render
  // ============================================================================
  function render(g) {
    document.getElementById('page-sub').textContent =
      `${formatMoney(g.goal)} target · ${formatDateLong(g.start_date)} → ${formatDateLong(g.end_date)}`;

    if (g.error) {
      document.getElementById('content').innerHTML = `<div class="empty-state">${g.error}</div>`;
      return;
    }

    if (g.days_elapsed === 0) {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          No sales data uploaded yet for the goal window.<br>
          Upload at least one day of sales to see your pace.
        </div>
      `;
      return;
    }

    const paceSign = g.pace_diff >= 0 ? 'ahead' : 'behind';
    const paceClass = g.pace_diff >= 0 ? 'ahead' : 'behind';
    const paceAbs = Math.abs(g.pace_diff);

    const surplus = g.total_actual - g.total_required_to_date;

    document.getElementById('content').innerHTML = `
      <!-- Hero -->
      <div class="hero">
        <div class="hero-grid">
          <div>
            <div class="hero-label">Year-to-date revenue</div>
            <div class="hero-num">${formatMoney(g.total_actual)}</div>
            <div class="hero-sub">of ${formatMoney(g.goal)} goal · ${formatPct(g.pct_of_goal)}</div>
            <div class="progress-bar"><div class="fill" style="width: ${Math.min(g.pct_of_goal * 100, 100)}%"></div></div>
            <div class="progress-labels">
              <span>${g.days_elapsed} days in</span>
              <span>${g.days_remaining} days left</span>
            </div>
          </div>
          <div>
            <div class="hero-label">Pace vs. plan</div>
            <div class="hero-num ${paceClass}">${g.pace_diff >= 0 ? '+' : ''}${formatPct(g.pace_diff)}</div>
            <div class="hero-sub">
              ${paceSign === 'ahead'
                ? `${formatMoney(Math.abs(surplus))} ahead of where you should be`
                : `${formatMoney(Math.abs(surplus))} behind where you should be`}
            </div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <h2>Numbers</h2>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Required per day (avg)</div>
          <div class="stat-value">${formatMoney(g.daily_required)}</div>
          <div class="stat-foot">over the full year</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Needed per day (remaining)</div>
          <div class="stat-value ${g.needed_per_day_remaining > g.daily_required * 1.05 ? 'red' : ''}">${formatMoney(g.needed_per_day_remaining)}</div>
          <div class="stat-foot">to catch up by ${formatDateLong(g.end_date)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Should be at by today</div>
          <div class="stat-value">${formatMoney(g.total_required_to_date)}</div>
          <div class="stat-foot">${g.days_elapsed} days × ${formatMoney(g.daily_required)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Average per day so far</div>
          <div class="stat-value">${formatMoney(g.days_elapsed ? g.total_actual / g.days_elapsed : 0)}</div>
          <div class="stat-foot">across ${g.days_elapsed} uploaded days</div>
        </div>
      </div>

      <!-- Timeline chart -->
      <h2>Cumulative pace</h2>
      <div class="chart-wrap">
        <div class="chart-legend">
          <div class="item"><span class="legend-swatch" style="background: var(--text-dim);"></span> Required pace</div>
          <div class="item"><span class="legend-swatch" style="background: var(--accent);"></span> Actual</div>
          <div class="item"><span class="legend-swatch" style="background: var(--yellow); height: 2px;"></span> Today</div>
        </div>
        ${renderChart(g)}
      </div>
    `;
  }

  function renderChart(g) {
    const W = 1100, H = 360, PAD_L = 70, PAD_R = 20, PAD_T = 20, PAD_B = 40;
    const innerW = W - PAD_L - PAD_R;
    const innerH = H - PAD_T - PAD_B;

    const tl = g.timeline;
    if (tl.length === 0) return '<div class="empty-state">No data</div>';

    const maxY = Math.max(g.goal, tl[tl.length - 1].cumulative_required) * 1.05;
    const minY = 0;

    const xFor = i => PAD_L + (i / (tl.length - 1)) * innerW;
    const yFor = v => PAD_T + innerH - ((v - minY) / (maxY - minY)) * innerH;

    // Required line — full year
    const reqPath = tl.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xFor(i).toFixed(1)} ${yFor(d.cumulative_required).toFixed(1)}`).join(' ');

    // Actual line — only days with data
    const actualPts = [];
    for (let i = 0; i < tl.length; i++) {
      if (tl[i].cumulative_actual !== null) actualPts.push([i, tl[i].cumulative_actual]);
    }
    const actualPath = actualPts.length > 0
      ? actualPts.map((p, j) => `${j === 0 ? 'M' : 'L'} ${xFor(p[0]).toFixed(1)} ${yFor(p[1]).toFixed(1)}`).join(' ')
      : '';

    // Today marker
    const todayStr = todayISO();
    const todayIdx = tl.findIndex(d => d.date === todayStr);
    const todayX = todayIdx >= 0 ? xFor(todayIdx) : null;

    // Y-axis ticks (every $1M)
    const yTicks = [];
    for (let v = 0; v <= maxY; v += 1000000) yTicks.push(v);

    // X-axis ticks — month starts
    const monthTicks = [];
    let lastMonth = -1;
    for (let i = 0; i < tl.length; i++) {
      const d = parseISO(tl[i].date);
      if (d.getUTCMonth() !== lastMonth) {
        lastMonth = d.getUTCMonth();
        monthTicks.push({ i, label: d.toLocaleDateString('en-US', { month: 'short', timeZone: 'UTC' }) });
      }
    }

    return `
      <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <!-- Y grid + labels -->
        ${yTicks.map(v => `
          <line x1="${PAD_L}" x2="${W - PAD_R}" y1="${yFor(v)}" y2="${yFor(v)}" stroke="var(--border)" stroke-width="1" />
          <text x="${PAD_L - 8}" y="${yFor(v) + 4}" text-anchor="end" font-size="11" fill="var(--text-dim)">$${(v/1000000).toFixed(0)}M</text>
        `).join('')}
        <!-- X labels -->
        ${monthTicks.map(t => `
          <text x="${xFor(t.i)}" y="${H - PAD_B + 18}" text-anchor="middle" font-size="11" fill="var(--text-dim)">${t.label}</text>
        `).join('')}
        <!-- Required line -->
        <path d="${reqPath}" fill="none" stroke="var(--text-dim)" stroke-width="1.5" stroke-dasharray="4 4" />
        <!-- Actual line -->
        ${actualPath ? `<path d="${actualPath}" fill="none" stroke="var(--accent)" stroke-width="2.5" />` : ''}
        <!-- Today marker -->
        ${todayX !== null ? `
          <line x1="${todayX}" x2="${todayX}" y1="${PAD_T}" y2="${H - PAD_B}" stroke="var(--yellow)" stroke-width="1" stroke-dasharray="2 3" opacity="0.7" />
          <text x="${todayX}" y="${PAD_T - 4}" text-anchor="middle" font-size="10" fill="var(--yellow)">today</text>
        ` : ''}
      </svg>
    `;
  }
</script>

</body>
</html>
