<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goal Tracker — Burlebo Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/auth.js"></script>
<style>
  /* Original-app palette — keeps this page matching the source dashboard look */
  :root {
    --bg: #0a0b0f;
    --bg2: #10121a;
    --bg3: #181b26;
    --card: #1c1f2e;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #e2e4ef;
    --muted: #6b7094;
    --orange: #f97316;
    --blue: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --purple: #a855f7;
    --gold: #f59e0b;
    --teal: #06b6d4;

    /* Aliases consumed by auth.js modal — map onto this palette */
    --panel:    var(--card);
    --panel-2:  var(--bg3);
    --text-dim: var(--muted);
    --accent:   var(--orange);
    --radius: 12px;
    --radius-sm: 8px;

    --coy:      #f97316;  --coy-bg:      rgba(249,115,22,0.15);
    --designer: #a855f7;  --designer-bg: rgba(168,85,247,0.15);
    --admin:    #10b981;  --admin-bg:    rgba(16,185,129,0.15);
    --employee: #06b6d4;  --employee-bg: rgba(6,182,212,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px;
    display: flex; flex-direction: column; min-height: 100vh;
  }

  /* HEADER (matches the rest of our dashboard, dark palette) */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 18px; letter-spacing: -0.5px; margin: 0;
  }
  header h1 span { color: var(--orange); }
  header nav { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  header nav a {
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-weight: 500;
    padding: 6px 10px; border-radius: 6px;
  }
  header nav a:hover { color: var(--text); background: var(--bg3); }
  header nav a.active { color: var(--orange); background: rgba(249,115,22,0.10); }
  .role-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .role-pill:hover { opacity: 0.85; }
  .role-pill.coy      { background: var(--coy-bg);      color: var(--coy); }
  .role-pill.designer { background: var(--designer-bg); color: var(--designer); }
  .role-pill.admin    { background: var(--admin-bg);    color: var(--admin); }
  .role-pill.employee { background: var(--employee-bg); color: var(--employee); }

  /* MAIN */
  main { flex: 1; padding: 24px; max-width: 1280px; margin: 0 auto; width: 100%; }
  main.hidden { display: none; }

  /* HEAD STRIP */
  .page-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .page-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .controls {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0; flex-wrap: wrap;
  }
  .btn {
    padding: 7px 14px; border-radius: 8px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    border: 1px solid var(--border2); background: var(--bg3); color: var(--muted);
    transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,0.08); }
  .btn-primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .btn-primary:hover { background: #ea6b0d; color: #fff; }

  /* CARDS */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
  }
  .card-title {
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 16px;
  }

  /* KPI mini-cards */
  .kpi { position: relative; overflow: hidden; }
  .kpi::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .kpi.orange::after { background: var(--orange); }
  .kpi.blue::after   { background: var(--blue); }
  .kpi.green::after  { background: var(--green); }
  .kpi.red::after    { background: var(--red); }
  .kpi.muted::after  { background: var(--muted); }
  .kpi-label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
  }
  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: -1px; line-height: 1;
  }

  /* GOAL TRACKER bits */
  .goal-bar-track {
    height: 16px; background: var(--bg3); border-radius: 8px;
    overflow: hidden; margin: 12px 0;
  }
  .goal-bar-fill {
    height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, var(--orange), var(--gold));
    transition: width 0.6s;
  }
  .goal-stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 20px;
  }
  @media (max-width: 880px) { .goal-stats { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 460px) { .goal-stats { grid-template-columns: 1fr; } }

  .section-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }

  /* CHART */
  .chart-wrap { position: relative; }

  /* TABLE */
  .table-wrap {
    border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border); background: var(--card);
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--bg3); padding: 10px 14px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--muted); text-align: left;
    border-bottom: 1px solid var(--border); font-weight: 500;
  }
  th.r, td.r { text-align: right; }
  td { padding: 10px 14px; font-size: 13px; border-top: 1px solid var(--border); }
  tbody tr:first-child td { border-top: none; }
  td.mono { font-family: 'DM Mono', monospace; font-size: 12px; }

  /* EMPTY + LOADER */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }
  .loader {
    display: flex; align-items: center; justify-content: center;
    padding: 60px; gap: 10px; color: var(--muted); font-size: 13px;
  }
  .spin {
    width: 16px; height: 16px;
    border: 2px solid var(--border2); border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header id="app-header" style="display:none;">
  <h1>Burlebo<span> /</span> Analytics</h1>
  <nav id="main-nav">
    <span class="role-pill" id="role-pill" title="Click to switch role"></span>
  </nav>
</header>

<main id="app-main" class="hidden">
  <div class="page-title">🎯 Goal Tracker</div>
  <div class="page-sub" id="page-sub">Loading goal config…</div>

  <div class="controls">
    <button class="btn btn-primary" onclick="loadGoals()">🔄 Refresh</button>
    <a class="btn" href="/settings.html">⚙️ Edit Goal in Settings</a>
  </div>

  <div id="goals-content">
    <div class="loader"><div class="spin"></div> Loading goal tracker…</div>
  </div>
</main>

<script>
  // =====================================================
  // Shared nav loader
  // =====================================================
  async function loadSharedNav() {
    try {
      const r = await fetch('/nav.html', { cache: 'no-cache' });
      if (!r.ok) return;
      const html = await r.text();
      const nav = document.getElementById('main-nav');
      const pill = document.getElementById('role-pill');
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const here = window.location.pathname.replace(/\/$/, '') || '/';
      for (const a of tmp.querySelectorAll('a')) {
        const href = a.getAttribute('href');
        if (href === here || (href === '/' && here === '/')) a.classList.add('active');
        nav.insertBefore(a, pill);
      }
    } catch (err) { console.error('Nav load failed:', err); }
  }

  const SUPABASE_URL = 'https://uoetojuyzyngfopsmmxk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvZXRvanV5enluZ2ZvcHNtbXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODY3ODIsImV4cCI6MjA5NDk2Mjc4Mn0.FVhs_0waTWIYkTVY2j4HERhlovggIFau07RuBu69M8E';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  window.onAuthReady = function (r) {
    loadSharedNav();
    loadGoals();
  };

  // =====================================================
  // Formatting helpers (mirror the original app)
  // =====================================================
  const fmt = v => v == null || isNaN(v) ? '—'
    : v >= 1e6 ? '$' + (v/1e6).toFixed(2) + 'M'
    : v >= 1e3 ? '$' + (v/1e3).toFixed(1) + 'K'
    : '$' + v.toFixed(2);
  const fmtP  = v => (v*100).toFixed(1) + '%';
  const fmtPn = v => v > 0 ? '+' + fmtP(v) : fmtP(v);

  function loading(elId) {
    document.getElementById(elId).innerHTML = '<div class="loader"><div class="spin"></div> Loading…</div>';
  }
  function miniKpi(label, value, color) {
    return `<div class="card kpi ${color}"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div></div>`;
  }

  // =====================================================
  // Date helpers (UTC-safe)
  // =====================================================
  function toISO(date) {
    return date.getUTCFullYear() + '-'
      + String(date.getUTCMonth() + 1).padStart(2, '0') + '-'
      + String(date.getUTCDate()).padStart(2, '0');
  }
  function parseISO(s) {
    if (!s) return null;
    const parts = String(s).slice(0, 10).split('-').map(n => parseInt(n, 10));
    if (parts.length !== 3 || parts.some(isNaN)) return null;
    return new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
  }
  function daysBetween(a, b) { return Math.round((b.getTime() - a.getTime()) / 86400000); }
  function addDays(d, n) {
    const x = new Date(d.getTime());
    x.setUTCDate(x.getUTCDate() + n);
    return x;
  }
  function todayISO() { return toISO(new Date()); }

  // =====================================================
  // Calculator — same math as the Python goal_tracker
  // =====================================================
  function buildGoalTracker(dailySales, config) {
    const goal = (config && config.goal) || {};
    const target   = parseFloat(goal.target || 7000000);
    const startStr = goal.start_date || '2026-01-01';
    const endStr   = goal.end_date   || '2026-12-31';

    const start = parseISO(startStr);
    const end   = parseISO(endStr);
    if (!start || !end) return { error: 'Invalid goal dates' };

    const totalDays = daysBetween(start, end) + 1;
    const dailyRequired = totalDays > 0 ? target / totalDays : 0;
    const today = parseISO(todayISO());

    const timeline = [];
    let cumulativeRequired = 0;
    let cumulativeActual = 0;
    let current = new Date(start.getTime());
    while (current <= end) {
      const dateStr = toISO(current);
      cumulativeRequired += dailyRequired;
      const actual = dailySales[dateStr];
      const hasActual = actual !== undefined && actual !== null;
      if (hasActual) cumulativeActual += actual;
      const isPast = current <= today;
      timeline.push({
        date: dateStr,
        required: dailyRequired,
        cumulative_required: cumulativeRequired,
        actual: hasActual ? actual : null,
        cumulative_actual: isPast ? cumulativeActual : null,
        pct_diff: hasActual && dailyRequired > 0 ? (actual - dailyRequired) / dailyRequired : null,
      });
      current = addDays(current, 1);
    }

    // Calendar days that have passed from goal start through today (inclusive),
    // clamped to the goal end date. This is the right denominator for
    // "where should we be by now?", independent of how many CSVs have been
    // uploaded. Gaps in uploaded data should NOT lower the target.
    let daysElapsed;
    if (today < start)    daysElapsed = 0;
    else if (today > end) daysElapsed = totalDays;
    else                  daysElapsed = daysBetween(start, today) + 1; // +1: start day counts

    const daysWithData        = timeline.filter(r => r.actual !== null).length;
    const totalActual         = timeline.reduce((s, r) => s + (r.actual || 0), 0);
    const totalRequiredToDate = dailyRequired * daysElapsed;
    const pctOfGoal           = target > 0 ? totalActual / target : 0;
    const paceDiff            = totalRequiredToDate > 0 ? (totalActual - totalRequiredToDate) / totalRequiredToDate : 0;
    const daysRemaining       = today <= end ? daysBetween(today, end) : 0;
    const neededPerDayRemaining = daysRemaining > 0 ? (target - totalActual) / daysRemaining : 0;

    return {
      goal: target,
      start_date: startStr,
      end_date: endStr,
      daily_required: dailyRequired,
      total_actual: totalActual,
      total_required_to_date: totalRequiredToDate,
      pct_of_goal: pctOfGoal,
      pace_diff: paceDiff,
      days_elapsed: daysElapsed,
      days_with_data: daysWithData,
      days_remaining: daysRemaining,
      needed_per_day_remaining: neededPerDayRemaining,
      timeline,
    };
  }

  // =====================================================
  // Data load
  // =====================================================
  async function loadGoals() {
    loading('goals-content');

    const { data: configRow, error: configErr } = await sb
      .from('dashboard_config').select('*').eq('id', 1).single();
    if (configErr) {
      document.getElementById('goals-content').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Couldn't load goal config</div><div class="empty-sub">${configErr.message}</div></div>`;
      return;
    }

    const goalConfig = configRow.goal || {};
    const startStr = goalConfig.start_date || '2026-01-01';
    const endStr   = goalConfig.end_date   || '2026-12-31';

    // Fetch ALL rows in the date window. Supabase/PostgREST caps a single
    // response at 1000 rows by default, so we paginate via .range() until we
    // get a short page back.
    const PAGE = 1000;
    const allSalesRows = [];
    let offset = 0;
    while (true) {
      const { data: page, error: salesErr } = await sb
        .from('sales_daily')
        .select('date, revenue')
        .gte('date', startStr)
        .lte('date', endStr)
        .order('date', { ascending: true })
        .range(offset, offset + PAGE - 1);
      if (salesErr) {
        document.getElementById('goals-content').innerHTML =
          `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Couldn't load sales</div><div class="empty-sub">${salesErr.message}</div></div>`;
        return;
      }
      if (!page || page.length === 0) break;
      allSalesRows.push(...page);
      if (page.length < PAGE) break;  // last page reached
      offset += PAGE;
      // Sanity cap to prevent runaway loop — 1M rows is way more than we'll ever have
      if (offset > 1_000_000) break;
    }

    const dailySales = {};
    for (const r of allSalesRows) {
      const key = (r.date instanceof Date) ? toISO(r.date) : String(r.date).slice(0, 10);
      dailySales[key] = (dailySales[key] || 0) + parseFloat(r.revenue || 0);
    }

    const result = buildGoalTracker(dailySales, configRow);
    renderGoals(result);
  }

  // =====================================================
  // Render — straight port of the original renderGoals
  // =====================================================
  let goalChartInst = null;

  function renderGoals(d) {
    document.getElementById('page-sub').textContent =
      `${fmt(d.goal || 0)} target · ${d.start_date} → ${d.end_date}`;

    if (d.error) {
      document.getElementById('goals-content').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">${d.error}</div></div>`;
      return;
    }
    if (d.days_with_data === 0) {
      document.getElementById('goals-content').innerHTML = `
        <div class="empty">
          <div class="empty-icon">📊</div>
          <div class="empty-title">No sales data uploaded yet for the goal window</div>
          <div class="empty-sub">Upload at least one day of sales to see your pace.</div>
        </div>`;
      return;
    }

    const ahead = d.pace_diff >= 0;
    const paceColor = ahead ? 'var(--green)' : 'var(--red)';
    const progressPct = Math.min(100, d.pct_of_goal * 100);

    let html = `
      <div class="card" style="margin-bottom:20px;">
        <div class="section-hdr">
          <div>
            <div class="section-title">$${(d.goal/1e6).toFixed(1)}M Goal — ${d.start_date} → ${d.end_date}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px;">
              ${d.days_elapsed} days elapsed · ${d.days_remaining} days remaining
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:${paceColor};">${fmtPn(d.pace_diff)}</div>
            <div style="font-size:12px;color:var(--muted);">vs required pace</div>
          </div>
        </div>
        <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${progressPct.toFixed(1)}%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);">
          <span>${fmt(d.total_actual)} actual</span>
          <span>${progressPct.toFixed(1)}% of goal</span>
          <span>${fmt(d.goal)} target</span>
        </div>
      </div>

      <div class="goal-stats">
        ${miniKpi('Total Revenue',          fmt(d.total_actual),                'orange')}
        ${miniKpi('Required to Date',       fmt(d.total_required_to_date),      'blue')}
        ${miniKpi('Daily Required (avg)',   fmt(d.daily_required),              'muted')}
        ${miniKpi('Needed/Day (remaining)', fmt(d.needed_per_day_remaining),
          d.needed_per_day_remaining <= d.daily_required ? 'green' : 'red')}
      </div>

      <div class="card" style="margin-bottom:20px;">
        <div class="card-title">Daily Revenue vs Goal Pace</div>
        <div class="chart-wrap" style="height:260px"><canvas id="goal-chart"></canvas></div>
      </div>

      <div class="section-hdr"><div class="section-title">Recent Days</div></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th class="r">Actual</th>
              <th class="r">Required</th>
              <th class="r">Cumulative Actual</th>
              <th class="r">Cumulative Required</th>
              <th class="r">Diff</th>
            </tr>
          </thead>
          <tbody>
            ${(d.timeline.filter(r => r.actual !== null).slice(-30).reverse()).map(r => {
              const diff = r.pct_diff;
              const dc = diff >= 0 ? 'green' : 'red';
              return `
                <tr>
                  <td class="mono">${r.date}</td>
                  <td class="r">${fmt(r.actual)}</td>
                  <td class="r">${fmt(r.required)}</td>
                  <td class="r">${fmt(r.cumulative_actual)}</td>
                  <td class="r">${fmt(r.cumulative_required)}</td>
                  <td class="r" style="color:var(--${dc});">${diff !== null ? fmtPn(diff) : '—'}</td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;

    document.getElementById('goals-content').innerHTML = html;

    // Chart
    setTimeout(() => {
      const ctx = document.getElementById('goal-chart');
      if (!ctx) return;
      if (goalChartInst) goalChartInst.destroy();
      const tl = d.timeline;
      const labels   = tl.map(r => r.date.slice(5));
      const actuals  = tl.map(r => r.actual);
      const cumActual = tl.map(r => r.cumulative_actual);
      const cumReq    = tl.map(r => r.cumulative_required);
      const step      = Math.max(1, Math.floor(labels.length / 12));
      const dispLabels = labels.map((l, i) => i % step === 0 ? l : '');

      goalChartInst = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: dispLabels,
          datasets: [
            { type: 'bar',  label: 'Daily Revenue',     data: actuals,    backgroundColor: 'rgba(249,115,22,0.4)',                                   yAxisID: 'y'  },
            { type: 'line', label: 'Cumulative Actual', data: cumActual,  borderColor: '#f97316', borderWidth: 2,   pointRadius: 0, tension: 0.3,    yAxisID: 'y2' },
            { type: 'line', label: 'Required Pace',    data: cumReq,     borderColor: '#6b7094', borderWidth: 1.5, pointRadius: 0, tension: 0,
              borderDash: [5,5], yAxisID: 'y2' },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend:  { labels: { color: '#6b7094', font: { size: 11 } } },
            tooltip: { backgroundColor: '#1c1f2e', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }
          },
          scales: {
            x:  { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7094', font: { size: 10 } } },
            y:  { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7094', font: { size: 10 }, callback: v => fmt(v) }, position: 'left' },
            y2: { grid: { display: false },                 ticks: { color: '#6b7094', font: { size: 10 }, callback: v => fmt(v) }, position: 'right' }
          }
        }
      });
    }, 50);
  }
</script>
</body>
</html>
